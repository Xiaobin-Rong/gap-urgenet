speech_scps:
- /data/ssd0/URGENT2_DATA/tmp/speech_validation_subset/speech_validation_subset_filtered.scp

noise_scps:
- /data/ssd0/URGENT2_DATA/tmp/dns5_noise_resampled_validation.scp
- /data/ssd0/URGENT2_DATA/tmp/wham_noise_validation.scp
- /data/ssd0/URGENT2_DATA/tmp/fma_noise_resampled_validation.scp
- /data/ssd0/URGENT2_DATA/tmp/fsd50k_noise_resampled_validation.scp

wind_noise_scps:
- /data/ssd0/URGENT2_DATA/tmp/wind_noise_validation.scp
prob_wind_noise: 0.05
wind_noise_config:
  threshold: [0.1, 0.3]
  ratio: [1, 20]
  attack: [5, 100]
  release: [5, 100]
  sc_gain: [0.8, 1.2]
  clipping_threshold: [0.85, 1.0]
  clipping_chance: 0.75
wind_noise_snr_low_bound: -10.0
wind_noise_snr_high_bound: 15.0

rir_scps:
- /data/ssd0/URGENT2_DATA/tmp/dns5_rirs.scp
prob_reverberation: 0.5

augmentations:
  bandwidth_limitation:
    weight: 1.0
    resample_methods: random
  clipping:
    weight: 1.0
    clipping_min_quantile: [0.0, 0.1]
    clipping_max_quantile: [0.9, 1.0]
  codec:
    weight: 1.0
    config:
      - format: mp3
        encoder: null
        qscale: [1, 10]
      - format: ogg
        encoder: [vorbis, opus]
        qscale: [-1, 10]
  packet_loss:
    weight: 1.0
    packet_duration_ms: 20
    max_continuous_packet_loss: 10
    packet_loss_rate: [0.05, 0.25]

# key: number of aug. value: probability
num_augmentations:
  - 0.25
  - 0.40
  - 0.20
  - 0.15